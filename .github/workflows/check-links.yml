name: 補助金データ鮮度チェック

on:
  schedule:
    # 毎週月曜 09:00 JST（UTC 00:00）
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 鮮度チェック実行
        id: check
        run: python scripts/check_links.py | tee report.md

      - name: リンク切れ検出時に Issue を作成
        if: steps.check.outputs.dead_count != '0'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "補助金データ 鮮度チェック: リンク切れ${{ steps.check.outputs.dead_count }}件 ($(date +%Y-%m-%d))" \
            --body-file report.md \
            --repo "${{ github.repository }}" || true
